<div
  class="p-4 bg-indigo-900/95 rounded-xl shadow-sm
         flex items-center gap-3 border border-white/10
         hover:bg-indigo-800/95 hover:shadow-md hover:-translate-y-0.5
         transition-all"
>
  <img
    [src]="icon()"
    [alt]="title()"
    class="w-8 h-8 object-contain"
    loading="lazy"
    (error)="onImgError($event)"
  />

  <p class="text-white font-semibold text-base md:text-lg">
    {{ title() }}
  </p>
</div>
